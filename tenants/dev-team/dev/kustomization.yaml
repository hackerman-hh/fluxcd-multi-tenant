apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tenant-a-dev

resources:
  - namespace.yaml
  - ../../base

labels:
- includeSelectors: true
  pairs:
    env: dev
    toolkit.fluxcd.io/tenant: dev-team

patches:
  - target:
      kind: Kustomization
    patch: |
      - op: add
        path: /spec/path
        value: ./staging
      - op: add
        path: /spec/targetNamespace
        value: tenant-a-dev
      - op: replace
        path: /metadata/name
        value: tenant-a-dev
  - target:
      kind: RoleBinding
    patch: |
      - op: replace
        path: /subjects/0/name
        value: gotk:tenant-a-dev:reconciler
      