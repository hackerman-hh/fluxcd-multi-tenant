apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tenant-a-prod

resources:
  - namespace.yaml
  - ../../base

labels:
- includeSelectors: true
  pairs:
    env: prod
    toolkit.fluxcd.io/tenant: dev-team

patches:
  - target:
      kind: GitRepository
    patch: |
      - op: add
        path: /spec/secretRef/name
        value: "secret-basic-auth"
  - target:
      kind: Kustomization
    patch: |
      - op: add
        path: /spec/path
        value: ./production
      - op: replace
        path: /metadata/name
        value: tenant-a-prod
  - target:
      kind: RoleBinding
    patch: |
      - op: replace
        path: /subjects/0/name
        value: gotk:tenant-a-prod:reconciler