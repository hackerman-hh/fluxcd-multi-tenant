name: Parse Issue

on:
  issues:
    types: [opened, edited]

jobs:
  parse:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Parse Issue Body
        id: issue-parser
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/new-tenant.yml

      - name: Extract and Save Data
        id: custom-extractor
        env:
          RAW_JSON: ${{ steps.issue-parser.outputs.jsonString }}
        run: |
          # 1. Extract values using jq
          TENANT=$(echo "$RAW_JSON" | jq -r '.tenant_id')
          ENVIRONMENTS=$(echo "$RAW_JSON" | jq -c '.environments')
          
          # 2. Save single-line strings safely to the $GITHUB_ENV
          echo "TENANT_ID=$TENANT" >> $GITHUB_ENV
          echo "ENVIRONMENTS=$ENVIRONMENTS" >> $GITHUB_ENV
          
          # 3. Save multi-line strings safely using a Heredoc delimiter
          echo "WHAT_HAPPENED<<EOF" >> $GITHUB_ENV
          echo "$RAW_JSON" | jq -r '."what-happened"' >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Next Step Example
        run: |
          # You can now cleanly access these in any later step of this job
          echo "Using tenant across steps: $TENANT_ID"
          echo "Using environments: $ENVIRONMENTS"
          echo "Using multi-line what happened:"
          echo "$WHAT_HAPPENED"
          # 3. Echo the final extracted data
          echo "Tenant: ${TENANT}"
          echo "Environments: ${ENVIRONMENTS}"
          echo "what-happened: ${WHAT}"
